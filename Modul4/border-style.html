<!DOCTYPE html>
<html>
<head>
<title>Border Style</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Pacifico&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:#fff0f6;
padding:20px;
}

h2{
color:#d81b60;
font-family:'Pacifico';
}

p{
padding:10px;
border-width:3px;
margin:10px 0;
border-color:#ff4fa3;
border-radius:10px;
background:white;
}

p.dotted{border-style:dotted;}
p.dashed{border-style:dashed;}
p.solid{border-style:solid;}
p.double{border-style:double;}
p.groove{border-style:groove;}
p.none{border-style:none;}

span{
padding:5px;
border-width:2px;
border-color:#ff4fa3;
border-radius:6px;
background:white;
}

span.ridge{border-style:ridge;}
span.inset{border-style:inset;}
span.dotted{border-style:dotted;}
span.outset{border-style:outset;}

</style>
</head>

<body>

<h2>Macam Border Paragraf</h2>

<p class="dotted">Border titik-titik</p>
<p class="dashed">Border garis putus</p>
<p class="solid">Border garis utuh</p>
<p class="double">Border garis ganda</p>
<p class="groove">Border efek dalam</p>
<p class="none">Tanpa border</p>

<hr>

<h2>Macam Border Span</h2>

<span class="ridge">Ridge</span><br><br>
<span class="inset">Inset</span><br><br>
<span class="dotted">Dotted</span><br><br>
<span class="outset">Outset</span>

</body>
</html>
