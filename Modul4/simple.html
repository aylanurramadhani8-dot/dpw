<!DOCTYPE html>
<html>
<head>
<title>Simple Selector</title>

<style>

body{
font-family:Poppins;
background:#fff0f6;
padding:30px;
}

p{
text-align:center;
color:#c2185b;
border:2px solid #ff8fd1;
padding:10px;
border-radius:8px;
}

#kalimat{
color:#d81b60;
background:#ffd9ec;
}

.center{
color:#ff4fa3;
}

</style>

</head>
<body>

<p>Contoh paragraf utama</p>
<p id="kalimat">Contoh dengan id</p>
<p class="center">Contoh dengan class</p>

</body>
</html>
