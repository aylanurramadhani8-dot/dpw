<!DOCTYPE html>
<html>
<head>
<title>Pseudo Class</title>

<style>

body{
font-family:Poppins;
background:#fff0f6;
padding:30px;
}

div{
background:#ffd9ec;
padding:20px;
border-radius:10px;
border:2px solid #ff4fa3;
}

p{
display:none;
background:white;
padding:10px;
margin-top:10px;
}

div:hover p{
display:block;
}

a{
color:#c2185b;
text-decoration:none;
}

a:hover{
color:#ff4fa3;
font-weight:bold;
}

</style>

</head>
<body>

<div>
Arahkan mouse ke sini
<p>Ini muncul saat di hover</p>
</div>

<br>

<a href="#">Coba arahkan ke link ini</a>

</body>
</html>
