<!DOCTYPE html>
<html>
<head>
<title>Pseudo Element</title>

<style>
body{
font-family:Poppins;
background:#fff0f6;
padding:30px;
}

p::first-line{
background:#ffb3d9;
font-weight:bold;
}

.container{
background:white;
padding:20px;
border-radius:10px;
border:3px solid #ff8fd1;
}
</style>

</head>
<body>

<div class="container">

<h3>Contoh Pseudo Element</h3>

<p>
Baris pertama akan diberi highlight warna pink agar terlihat lebih menarik dan menonjol.
Baris berikutnya tetap normal seperti teks biasa.
</p>

</div>

</body>
</html>
