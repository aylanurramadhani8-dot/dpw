<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Validasi Masukan</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
<style>body{font-family:'Poppins',sans-serif;background:#ffe6f0}.card{border:1px solid #ff4fa3}</style>
</head>
<body>

<div class="container my-4">
<div class="card p-3">
<h2 class="text-danger">Validasi Form Nama</h2>
<form name="formku">
<label>Nama:</label>
<input type="text" name="nama" class="form-control mb-2">
<button type="button" class="btn btn-danger" onclick="cekNama(this.form)">Kirim</button>
</form>
</div>
</div>

<script>
function cekNama(form) {
  if (form.elements[0].value == "") {
    alert("Nama harus dimasukkan");
    form.nama.focus();
    form.nama.select();
    return false;
  }
  alert("Terima kasih, " + form.elements[0].value);
  return true;
}
</script>

</body>
</html>
