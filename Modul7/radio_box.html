<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Radio Box</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
<style>body{font-family:'Poppins',sans-serif;background:#ffe6f0}.card{border:1px solid #ff4fa3}</style>
</head>
<body>

<div class="container my-4">
<div class="card p-3">
<h2 class="text-danger">Pilih Musik Favorit</h2>
<form name="formTes">
<div class="form-check"><input type="radio" name="radioMusik" value="Jazz" onclick="info()"> Jazz</div>
<div class="form-check"><input type="radio" name="radioMusik" value="Keroncong" onclick="info()"> Keroncong</div>
<div class="form-check"><input type="radio" name="radioMusik" value="Dangdut" onclick="info()"> Dangdut</div>
<div class="form-check"><input type="radio" name="radioMusik" value="Lainnya" onclick="info()"> Lainnya</div>
<hr>
Info: <input type="text" name="fieldMusik" size="40" class="form-control mt-2">
</form>
</div>
</div>

<script>
function info() {
  for (var i = 0; i < 4; i++) {
    if (document.formTes.radioMusik[i].checked) {
      document.formTes.fieldMusik.value = document.formTes.radioMusik[i].value;
    }
  }
}
</script>

</body>
</html>
