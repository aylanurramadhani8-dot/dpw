<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Dialog Box</title>
<link rel="stylesheet" href="https://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
<style>body{font-family:'Poppins',sans-serif;background:#ffe6f0}.card{border:1px solid #ff4fa3}</style>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://code.jquery.com/ui/1.12.1/jquery-ui.js"></script>
</head>
<body>

<div class="container my-4">
<div class="card p-3">
<h2 class="text-danger">Basic Dialog jQuery</h2>
<p>Halaman ini akan otomatis menampilkan kotak dialog saat dimuat.</p>
<div id="dialogBasic" title="Informasi Penting">
<p>Ini adalah jendela <b>Basic Dialog</b> menggunakan jQuery UI.</p>
</div>
<button id="btnBuka" class="btn btn-danger">Buka Dialog Lagi</button>
</div>
</div>

<script>
$(function(){
  $("#dialogBasic").dialog({
    autoOpen:true,
    show:{effect:"blind",duration:500},
    hide:{effect:"explode",duration:500}
  });
  $("#btnBuka").on("click",function(){ $("#dialogBasic").dialog("open"); });
});
</script>

</body>
</html>
