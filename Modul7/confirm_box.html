<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Confirm Box</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
<style>body{font-family:'Poppins',sans-serif;background:#ffe6f0}.card{border:1px solid #ff4fa3}</style>
</head>
<body>

<div class="container my-4">
<div class="card p-3 text-center">
<h2 class="text-danger">JavaScript Confirm Box</h2>
<button class="btn btn-danger" onclick="myFunction()">Klik Ini</button>
<p id="demo"></p>
</div>
</div>

<script>
function myFunction() {
  var txt;
  if (confirm("Apakah Anda akan logout?")) {
    txt = "Anda mengklik OK";
  } else {
    txt = "Anda mengklik Cancel.";
  }
  document.getElementById("demo").innerHTML = txt;
}
</script>

</body>
</html>
