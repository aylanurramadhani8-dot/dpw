<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Dialog Download</title>
<link rel="stylesheet" href="https://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
<style>body{font-family:'Poppins',sans-serif;background:#ffe6f0}.card{border:1px solid #ff4fa3}</style>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://code.jquery.com/ui/1.12.1/jquery-ui.js"></script>
</head>
<body>

<div class="container my-4">
<div class="card p-3">
<h2 class="text-danger">Dialog Download</h2>
<div id="download-dialog" title="File Download">
  <div class="progress-label">Starting download...</div>
  <div id="progressbar"></div>
</div>
</div>
</div>

<script>
$(function(){
  var progressbar=$("#progressbar"),progressLabel=$(".progress-label");
  progressbar.progressbar({
    value:false,
    change:function(){progressLabel.text("Download Progress: "+progressbar.progressbar("value")+"%");},
    complete:function(){progressLabel.text("Download Complete!");}
  });
  function progress(){
    var val=progressbar.progressbar("value")||0;
    progressbar.progressbar("value",val+2);
    if(val<99){setTimeout(progress,80);}
  }
  $("#download-dialog").dialog();
  setTimeout(progress,1000);
});
</script>

</body>
</html>
