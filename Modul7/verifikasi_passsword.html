<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Verifikasi Password</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
<style>body{font-family:'Poppins',sans-serif;background:#ffe6f0}.card{border:1px solid #ff4fa3}</style>
</head>
<body>

<div class="container my-4">
<div class="card p-3">
<h2 class="text-danger">Verifikasi Password</h2>
<form name="formTes" action="tesform.htm" method="POST">
<div class="mb-3">
<label>Password Pengganti:</label>
<input type="password" name="password_1" class="form-control">
</div>
<div class="mb-3">
<label>Password Sekali Lagi:</label>
<input type="password" name="password_2" class="form-control">
</div>
<button type="button" class="btn btn-danger" onclick="cekPassword()">Proses</button>
</form>
</div>
</div>

<script>
function cekPassword() {
  if (document.formTes.password_1.value != document.formTes.password_2.value) {
    alert("Dua password yang Anda masukkan tidak sama");
  } else {
    window.location.href = "alert.html";
  }
}
</script>

</body>
</html>
