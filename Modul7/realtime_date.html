<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Waktu Real-time</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
<style>body{font-family:'Poppins',sans-serif;background:#ffe6f0}.card{border:1px solid #ff4fa3}</style>
</head>
<body onload="tampilkanWaktu()">

<div class="container my-4">
<div class="card p-3 text-center">
<h2 class="text-danger">Waktu Saat Ini</h2>
<div id="clock" style="font-size:24px;font-weight:bold;"></div>
</div>
</div>

<script>
function tampilkanWaktu() {
  setInterval(() => {
    const sekarang = new Date();
    document.getElementById('clock').innerHTML = sekarang.toLocaleString('id-ID');
  }, 1000);
}
</script>

</body>
</html>
