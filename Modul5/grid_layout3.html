<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Grid Layout 3</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Pacifico&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:#fff0f6;
padding:20px;
}

.grid-container{
display:grid;
grid-template-columns:auto auto auto auto;
gap:20px;
background:#ffd9ec;
padding:20px;
border-radius:15px;
}

.item1{
grid-row:1/4;
background:#ff4fa3;
color:white;
padding:20px;
text-align:center;
border-radius:10px;
}

.item{
background:white;
padding:20px;
text-align:center;
border-radius:10px;
border:2px solid #ff4fa3;
}

</style>
</head>

<body>

<h1 style="text-align:center;font-family:'Pacifico';color:#d81b60;">Grid Layout 3 🌷</h1>

<div class="grid-container">
<div class="item1">1</div>
<div class="item">2</div>
<div class="item">3</div>
<div class="item">4</div>
<div class="item">5</div>
<div class="item">6</div>
<div class="item">7</div>
<div class="item">8</div>

<div class="item">Kesimpulan: grid-row membuat item memanjang ke bawah.</div>
</div>

<footer style="text-align:center;margin-top:20px;color:#c2185b;">
© Ayla Nur Ramadhani - 253307006
</footer>

</body>
</html>
