<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Galeri Flexbox</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
margin:0;
background:#fff0f6;
padding:30px;
}

/* CONTAINER */
.container{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* JUDUL */
h2{
text-align:center;
color:#d81b60;
margin-bottom:20px;
}

/* GALERI FLEX */
.gallery{
display:flex;
flex-wrap:wrap;
gap:15px;
justify-content:center;
}

/* ITEM GAMBAR */
.gallery img{
width:120px;
height:120px;
object-fit:cover;
border-radius:10px;
border:3px solid #ff8fd1;
transition:0.3s;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

/* HOVER */
.gallery img:hover{
transform:scale(1.1);
border-color:#ff4fa3;
}

</style>

</head>

<body>

<div class="container">

<h2>Galeri Foto</h2>

<div class="gallery">

<img src="asset/gambar/img1.jpg">
<img src="asset/gambar/img2.jpg">
<img src="asset/gambar/img3.jpg">
<img src="asset/gambar/img4.jpg">
<img src="asset/gambar/img5.jpg">
<img src="asset/gambar/img6.jpg">
<img src="asset/gambar/img7.jpg">
<img src="asset/gambar/img8.jpg">
<img src="asset/gambar/img9.jpg">
<img src="asset/gambar/img10.jpg">
<img src="asset/gambar/img11.jpg">
<img src="asset/gambar/img12.jpg">
<img src="asset/gambar/img13.jpg">
<img src="asset/gambar/img14.jpg">
<img src="asset/gambar/img15.jpg">
<img src="asset/gambar/img16.jpg">

</div>

</div>

</body>
</html>
