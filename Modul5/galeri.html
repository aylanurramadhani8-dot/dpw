<!DOCTYPE html>
<html>
<head>
<title>Galeri</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Pacifico&display=swap" rel="stylesheet">

<style>
body{
font-family:'Poppins';
background:#fff0f6;
margin:0;
}

header{
background:linear-gradient(90deg,#ff4fa3,#ff8fd1);
color:white;
text-align:center;
padding:25px;
font-family:'Pacifico';
}

.galeri{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
padding:20px;
}

.item{
width:180px;
height:180px;
border-radius:15px;
overflow:hidden;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.item img{
width:100%;
height:100%;
object-fit:cover;
}

footer{
background:#c2185b;
color:white;
text-align:center;
padding:10px;
}
</style>
</head>

<body>

<header>Galeri Lucu 💖</header>

<div class="galeri">
<div class="item"><img src="https://picsum.photos/300?1"></div>
<div class="item"><img src="https://picsum.photos/300?2"></div>
<div class="item"><img src="https://picsum.photos/300?3"></div>
</div>

<footer>© Ayla Nur Ramadhani</footer>

</body>
</html>
