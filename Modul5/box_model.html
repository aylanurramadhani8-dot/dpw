<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Belajar Box Model</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Quicksand&family=Pacifico&display=swap" rel="stylesheet">

<style>
body{
font-family:'Poppins',sans-serif;
background:#fff0f6;
text-align:center;
margin:0;
}

header{
background:linear-gradient(90deg,#ff4fa3,#ff8fd1);
color:white;
padding:25px;
font-family:'Pacifico',cursive;
font-size:30px;
}

.box{
width:300px;
border:8px solid #ff4fa3;
padding:25px;
margin:40px auto;
background:white;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

img{
width:400px;
border-radius:15px;
margin-top:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

footer{
background:#c2185b;
color:white;
padding:10px;
margin-top:20px;
}
</style>
</head>

<body>

<header>Box Model HTML 💖</header>

<div class="box">
Teks ini berada pada box dengan menggunakan div.<br>
Padding 25px, Margin 30px dan Border pink.
</div>

<img src="img1.png">

<footer>© 2026 | Ayla Nur Ramadhani - 253307006</footer>

</body>
</html>
