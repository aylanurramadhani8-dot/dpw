<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Flexbox</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Quicksand&family=Pacifico&display=swap" rel="stylesheet">

<style>
body{
font-family:'Poppins',sans-serif;
background:#fff0f6;
margin:0;
}

header{
background:linear-gradient(90deg,#ff4fa3,#ff8fd1);
color:white;
padding:25px;
text-align:center;
font-family:'Pacifico';
}

.wadah-flex{
display:flex;
flex-wrap:wrap;
justify-content:center;
background:#ffd9ec;
padding:20px;
margin:20px;
border-radius:15px;
}

.wadah-flex div{
background:#ff4fa3;
color:white;
margin:10px;
padding:20px;
font-size:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

p{
padding:10px 20px;
}

footer{
background:#c2185b;
color:white;
text-align:center;
padding:10px;
}
</style>
</head>

<body>

<header>Flexbox 💖</header>

<div class="wadah-flex">
<div>1</div><div>2</div><div>3</div><div>4</div>
<div>5</div><div>6</div><div>7</div><div>8</div>
</div>

<p>Flexbox membuat layout fleksibel dan rapi.</p>

<footer>© 2026 | Ayla Nur Ramadhani</footer>

</body>
</html>
