<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Inline Grid</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Pacifico&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:#fff0f6;
padding:20px;
}

.tempat_grid{
display:inline-grid;
grid-template-columns:auto auto auto;
gap:15px;
background:#ffd9ec;
padding:20px;
border-radius:15px;
}

.item_grid{
background:white;
padding:20px;
border-radius:10px;
border:2px solid #ff4fa3;
text-align:center;
}

</style>
</head>

<body>

<h1 style="font-family:'Pacifico';color:#d81b60;">Inline Grid 💕</h1>

<div class="tempat_grid">
<div class="item_grid">1</div>
<div class="item_grid">2</div>
<div class="item_grid">3</div>
<div class="item_grid">4</div>
<div class="item_grid">5</div>
<div class="item_grid">6</div>
</div>

<p style="margin-top:20px;">
Kesimpulan: inline-grid tidak memenuhi lebar penuh.
</p>

<footer style="text-align:center;color:#c2185b;">
© Ayla Nur Ramadhani - 253307006
</footer>

</body>
</html>
