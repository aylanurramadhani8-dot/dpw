<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Grid Layout 1</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Quicksand:wght@400;600&family=Pacifico&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:#fff0f6;
padding:20px;
}

/* HEADER */
h1{
text-align:center;
font-family:'Pacifico',cursive;
color:#d81b60;
}

/* GRID */
.tempat_grid{
display:grid;
grid-template-columns:auto auto auto;
gap:20px;
background:#ffd9ec;
padding:20px;
border-radius:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.item_grid{
background:white;
border:2px solid #ff4fa3;
padding:20px;
font-size:25px;
text-align:center;
border-radius:10px;
}

/* FOOTER */
footer{
margin-top:20px;
text-align:center;
color:#c2185b;
font-weight:bold;
}

</style>
</head>

<body>

<h1>Grid Layout 1 🌸</h1>

<div class="tempat_grid">
<div class="item_grid">1</div>
<div class="item_grid">2</div>
<div class="item_grid">3</div>
<div class="item_grid">4</div>
<div class="item_grid">5</div>
<div class="item_grid">6</div>
<div class="item_grid">7</div>
<div class="item_grid">8</div>
<div class="item_grid">9</div>

<div class="item_grid">
Kesimpulan: Grid membuat tampilan rapi dalam bentuk kolom dan baris.
</div>
</div>

<footer>
© 2026 | Ayla Nur Ramadhani - 253307006
</footer>

</body>
</html>
