<!-- GOOGLE FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Quicksand:wght@400;600&family=Pacifico&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}

body{
font-family:'Poppins',sans-serif;
margin:0;
background:#fff0f6;
}

/* HEADER */
header{
background:linear-gradient(90deg,#ff4fa3,#ff8fd1);
padding:30px;
text-align:center;
font-size:35px;
color:white;
font-family:'Pacifico',cursive;
letter-spacing:2px;
}

/* NAV */
nav{
float:left;
width:30%;
background:#ffd9ec;
padding:20px;
border-right:4px solid #ff4f98;
height:660px;
}

nav a{
display:block;
padding:10px;
margin-bottom:8px;
text-decoration:none;
font-weight:bold;
color:#c2185b;
border-radius:6px;
font-family:'Quicksand',sans-serif;
transition:0.3s;
}

nav a:hover{
background:#ff89ca;
transform:translateX(5px);
}

/* ARTICLE */
article{
float:left;
width:70%;
padding:25px;
background:white;
height:660px;
}

article h1{
font-family:'Quicksand',sans-serif;
color:#d81b60;
}

.audio-box{
background:#fff0f6;
border:2px solid #ff8fd1;
border-radius:10px;
padding:15px;
margin-bottom:20px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

audio{
width:80%;
}

/* CLEAR */
section::after{
content:"";
display:table;
clear:both;
}

/* FOOTER */
footer{
background:#c2185b;
padding:10px;
text-align:center;
color:white;
}
</style>
</head>
